<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تولید و ویرایشگر تصویر هوش مصنوعی</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom styles for RTL layout and fixed footer */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #root {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding-top: 1.5rem; /* pt-6 */
            padding-bottom: 6rem; /* pb-24 for footer clearance */
        }
    </style>
</head>
<body>

<div id="root" class="flex flex-col h-screen bg-gray-50 font-sans antialiased"></div>

<script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;
    
    // Replace Lucide imports with manual icon components
    // Using inline SVG for simplicity and reduced dependencies in a single HTML file
    const Download = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Image = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const Send = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
    const X = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const Loader2 = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    // --- Utility Functions ---

    /**
     * Converts a File object to a Base64 string.
     */
    const fileToBase64 = (file) => {
        return new Promise((resolve, reject) => {
            if (!file) {
                return reject(new Error("No file provided."));
            }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const [mimePart, dataPart] = reader.result.split(',');
                const mimeType = mimePart.match(/:(.*?);/)[1];
                resolve({
                    base64: dataPart,
                    mimeType: mimeType
                });
            };
            reader.onerror = (error) => reject(error);
        });
    };

    /**
     * Implements exponential backoff for API calls.
     */
    const withExponentialBackoff = async (apiCall, maxRetries = 5) => {
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await apiCall();
                if (response.status !== 429 && response.status < 500) {
                    return response;
                }
            } catch (error) {
                // Ignore network errors and retry
            }

            if (i < maxRetries - 1) {
                const delay = Math.pow(2, i) * 1000 + Math.random() * 1000;
                await new Promise(resolve => setTimeout(resolve, delay));
            }
        }
        throw new Error("API call failed after multiple retries.");
    };


    // --- Component Definition ---

    const App = () => {
        const [history, setHistory] = useState([]);
        const [prompt, setPrompt] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [inputImage, setInputImage] = useState(null); // { file, base64, mimeType }
        const fileInputRef = useRef(null);
        const chatEndRef = useRef(null);

        // Custom alert/message box instead of native alert()
        const showMessage = (text) => {
            setHistory(prev => [...prev, {
                id: Date.now() + 999,
                role: 'error', // Reusing the error bubble style for simple messages
                text: text,
            }]);
        };

        const scrollToBottom = () => {
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
        };

        useEffect(() => {
            scrollToBottom();
        }, [history, isLoading]);


        const handleImageChange = async (event) => {
            const file = event.target.files[0];
            if (file) {
                try {
                    const { base64, mimeType } = await fileToBase64(file);
                    setInputImage({ file, base64, mimeType });
                } catch (error) {
                    console.error("Error converting file to base64:", error);
                    showMessage("امکان بارگذاری فایل تصویری وجود نداشت."); // Could not load image file.
                    setInputImage(null);
                }
            }
        };

        const handleClearImage = () => {
            setInputImage(null);
            if (fileInputRef.current) {
                fileInputRef.current.value = ''; // Clear file input value
            }
        };

        const handleGenerate = useCallback(async (e) => {
            e.preventDefault();
            if ((!prompt.trim() && !inputImage) || isLoading) return;

            const userPrompt = prompt.trim();
            const inputImageCopy = inputImage; // Capture current state
            
            // 1. Add user message/request to history immediately
            const userMessage = {
                id: Date.now(),
                role: 'user',
                text: userPrompt,
                image: inputImageCopy ? `data:${inputImageCopy.mimeType};base64,${inputImageCopy.base64}` : null,
                isEditing: !!inputImageCopy,
            };
            setHistory(prev => [...prev, userMessage]);

            // 2. Clear inputs
            setPrompt('');
            handleClearImage();
            setIsLoading(true);

            // API Configuration
            const apiKey = "";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;

            // 3. Construct Payload
            const parts = [{ text: userPrompt }];
            if (inputImageCopy) {
                parts.push({
                    inlineData: {
                        mimeType: inputImageCopy.mimeType,
                        data: inputImageCopy.base64,
                    }
                });
            }

            const payload = {
                contents: [{ parts: parts }],
                generationConfig: {
                    responseModalities: ['TEXT', 'IMAGE']
                },
            };

            const apiCall = () => fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            try {
                const response = await withExponentialBackoff(apiCall);
                const result = await response.json();

                const base64Data = result?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                if (base64Data) {
                    const generatedImageUrl = `data:image/png;base64,${base64Data}`;
                    const aiResponse = {
                        id: Date.now() + 1,
                        role: 'model',
                        image: generatedImageUrl,
                        text: inputImageCopy ? 'تصویر با موفقیت ویرایش شد!' : 'تصویر با موفقیت تولید شد!', // Success messages in Persian
                    };
                    setHistory(prev => [...prev, aiResponse]);
                } else {
                    const errorMessage = result.error?.message || "تولید تصویر با شکست مواجه شد. لطفاً دستور متنی دیگری را امتحان کنید."; // Generic failure message
                     setHistory(prev => [...prev, {
                        id: Date.now() + 1,
                        role: 'error',
                        text: errorMessage,
                    }]);
                }

            } catch (error) {
                console.error("API Error:", error);
                setHistory(prev => [...prev, {
                    id: Date.now() + 1,
                    role: 'error',
                    text: "در هنگام فراخوانی API خطایی رخ داد. لطفاً اتصال شبکه خود را بررسی کنید یا بعداً دوباره امتحان کنید.", // Network/API error
                }]);
            } finally {
                setIsLoading(false);
            }
        }, [prompt, inputImage, isLoading]);

        // --- Sub-Components for UI elements ---

        const DownloadButton = ({ imageUrl }) => {
            const handleDownload = () => {
                const link = document.createElement('a');
                link.href = imageUrl;
                // Determine filename based on content type
                const isEditing = history.find(item => item.image === imageUrl)?.isEditing;
                const filename = isEditing ? 'edited_ai_image.png' : 'generated_ai_image.png';

                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <button
                    onClick={handleDownload}
                    className="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full transition duration-300 shadow-md transform hover:scale-105"
                    title="دانلود تصویر"
                >
                    <Download size={20} />
                </button>
            );
        };

        const ChatBubble = ({ message }) => {
            const isModel = message.role === 'model';
            const isError = message.role === 'error';

            if (isError) {
                 return (
                    <div className="flex justify-center my-4">
                        <div className="bg-red-100 text-red-700 p-4 rounded-xl shadow-lg max-w-xl w-full text-right">
                            <p className="font-semibold">خطا:</p>
                            <p className="text-sm">{message.text}</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`flex mb-6 ${isModel ? 'justify-start' : 'justify-end'}`}>
                    <div className={`max-w-3xl w-full flex ${isModel ? 'flex-row' : 'flex-row-reverse'}`}>
                        <div className={`p-4 rounded-2xl shadow-xl transition-all duration-300 ${isModel ? 'bg-white border border-gray-100 ml-2 rounded-tr-none' : 'bg-indigo-600 text-white mr-2 rounded-tl-none'}`}>
                            {/* User Prompt/Text */}
                            {message.text && (
                                <p className={`text-sm ${isModel ? 'text-gray-800' : 'text-white'} text-right`}>{message.text}</p>
                            )}

                            {/* User Input Image (for editing) */}
                            {message.image && !isModel && message.isEditing && (
                                <div className="mt-3">
                                    <p className="text-xs font-semibold mb-2">تصویر ورودی برای ویرایش:</p>
                                    <img
                                        src={message.image}
                                        alt="Input for editing"
                                        className="max-w-full h-auto rounded-lg border-2 border-indigo-400 shadow-lg"
                                        style={{ maxHeight: '200px', objectFit: 'contain' }}
                                    />
                                </div>
                            )}

                            {/* AI Generated Image */}
                            {message.image && isModel && (
                                <div className="mt-3">
                                    <img
                                        src={message.image}
                                        alt="AI Generated Image"
                                        className="w-full h-auto max-h-[500px] object-cover rounded-lg shadow-xl mb-3"
                                    />
                                    <div className="flex justify-end">
                                        <DownloadButton imageUrl={message.image} />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        return (
            <div className="flex flex-col h-full bg-gray-50 font-sans antialiased">
                {/* Header */}
                <header className="p-4 bg-white shadow-md z-10 sticky top-0 border-b border-gray-100">
                    <h1 className="text-2xl font-bold text-indigo-700 flex items-center justify-end">
                        تولید کننده و ویرایشگر تصویر هوش مصنوعی
                        <Image className="mr-2" size={28} />
                    </h1>
                    <p className="text-sm text-gray-500 text-right">با قدرت مدل gemini-2.5-flash-image-preview</p>
                </header>

                {/* Chat History Area */}
                <main className="main-content p-4 md:p-8 space-y-4">
                    <div className="text-center text-gray-500 italic mb-8">
                        برای تولید تصویر جدید، یک دستور متنی وارد کنید؛ یا برای ویرایش، یک تصویر آپلود کرده و دستور ویرایش را بنویسید.
                    </div>
                    {history.map((message) => (
                        <ChatBubble key={message.id} message={message} />
                    ))}

                    {/* Loading Indicator */}
                    {isLoading && (
                        <div className="flex justify-start mb-6">
                             <div className="flex items-center p-4 rounded-2xl shadow-xl bg-white border border-gray-100 ml-2 rounded-tr-none">
                                <Loader2 className="animate-spin text-indigo-500 ml-2" size={20} />
                                <span className="text-gray-700 text-sm">در حال تولید/ویرایش تصویر...</span>
                            </div>
                        </div>
                    )}
                    <div ref={chatEndRef} />
                </main>

                {/* Input Footer Area */}
                <footer className="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-2xl border-t border-gray-100 z-20">
                    {/* Uploaded Image Preview */}
                    {inputImage && (
                        <div className="flex items-center p-3 mb-2 bg-indigo-50 rounded-lg border border-indigo-200">
                            <button
                                onClick={handleClearImage}
                                className="mr-auto p-1 text-gray-500 hover:text-red-500 rounded-full transition"
                                title="حذف تصویر"
                            >
                                <X size={16} />
                            </button>
                            <span className="text-sm font-medium text-gray-700 truncate ml-3">{inputImage.file.name} آماده برای ویرایش است.</span>
                            <Image className="text-indigo-600 ml-3" size={20} />
                        </div>
                    )}

                    <form onSubmit={handleGenerate} className="flex space-x-3 items-center w-full rtl:space-x-reverse">
                        {/* File Upload Button */}
                        <input
                            type="file"
                            accept="image/*"
                            ref={fileInputRef}
                            onChange={handleImageChange}
                            className="hidden"
                        />
                        <button
                            type="button"
                            onClick={() => fileInputRef.current.click()}
                            className={`p-3 rounded-full transition duration-300 shadow-lg ${inputImage ? 'bg-indigo-500 text-white hover:bg-indigo-600' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}
                            title="آپلود تصویر برای ویرایش"
                            disabled={isLoading}
                        >
                            <Image size={24} />
                        </button>

                        {/* Text Input */}
                        <input
                            type="text"
                            value={prompt}
                            onChange={(e) => setPrompt(e.target.value)}
                            placeholder={inputImage ? 'نحوه ویرایش تصویر را شرح دهید...' : 'تصویری که می‌خواهید تولید شود را شرح دهید...'}
                            className="flex-grow p-3 border border-gray-300 rounded-full focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 shadow-inner text-right"
                            disabled={isLoading}
                        />

                        {/* Send Button */}
                        <button
                            type="submit"
                            className="p-3 bg-indigo-600 text-white rounded-full transition duration-300 shadow-lg hover:bg-indigo-700 disabled:bg-indigo-300"
                            disabled={isLoading || (!prompt.trim() && !inputImage)}
                            title="تولید تصویر"
                        >
                            {isLoading ? <Loader2 className="animate-spin" size={24} /> : <Send size={24} />}
                        </button>
                    </form>
                </footer>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
